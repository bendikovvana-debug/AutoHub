<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BMW | AutoHub</title>

</head>

    <header>

    </header>

    <div class="cars-container">

        <div class="car-card">
            <img src="{{ url_for('static', filename='images/m5.jpg') }}" alt="BMW M5">
            <h2>BMW M5</h2>
            <p>Мощь и бизнес-комфорт.</p>
            <a href="/bmw/m5" class="btn">Подробнее</a>

        <div class="car-card">

            <p>Премиальный кроссовер.</p>
            <a href="/bmw/x5" class="btn">Подробнее</a>
        </div>

        <div class="car-card">
            <img src="{{ url_for('static', filename='images/m3.jpg') }}" alt="BMW M3">
            <h2>BMW M3</h2>
            <p>Спортивная легенда.</p>
